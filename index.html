<body>
    <div style = 'font-family: verdana;'>
    <h1 style = 'font-family:verdana'>jConsole</h1>
    <button style = 'font-family:verdana' id = 'settings' onclick = 'jConsole.switchinput()'>User input: off</button>

    <button style = 'font-family:verdana' onclick = 'jConsole.encode64()'>Encode Base64</button>
    <button style = 'font-family:verdana' onclick = 'jConsole.decode64()'>Decode Base64</button>
    </div>
    <h4 style = 'font-family:verdana'>Input text here:</h4>
    <pre id = 'input' contentEditable = 'true'></pre>
