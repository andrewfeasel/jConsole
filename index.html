<!doctype html>
<html>
<head>
    <script type='text/javascript' src = 'console.js'></script>
    <link rel = 'stylesheet' type = 'text/css' href = 'style.css'> 
</head>
<body>
    <h1>Console</h1>
    <button onclick = 'console.log()'>Log text</button>
    <button onclick = 'console.del()'>Delete all text</button>
    <button onclick = 'console.encode64()'>Encode to Base64</button>
    <button onclick = 'console.decode64()'>Decode from Base64</button>
    <button onclick = 'console.atou()'>Base64 to Unicode</button>
    <button onclick = 'console.utoa()'>Unicode to Base64</button>
    
    <pre id = 'consoleUI'></pre>
</body>
</html>
